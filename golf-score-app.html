<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Golynpic</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Golynpic">
<meta name="theme-color" content="#1a1a1a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Oswald:wght@400;600;700&display=swap');
:root{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;--card:#ffffff;
  --green:#1e8449;--gold:#c9a84c;
  --red:#e74c3c;--blue:#3498db;--purple:#9b59b6;
  --g1:#555;--g2:#888;--g3:#ccc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:#1a1a1a;display:flex;flex-direction:column;}

/* ── ヘッダー ── */
.hdr{background:var(--green);border-bottom:1px solid #1a6b3c;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;flex-shrink:0;}
.hdr-logo{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:2px;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-top:1px;}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.hbtn{border:1px solid rgba(255,255,255,0.7);color:#fff;background:rgba(255,255,255,0.15);padding:5px 9px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.hbtn.solid{background:#fff;color:var(--green);}
.hbtn.on{border-color:#fff;color:#fff;background:rgba(52,152,219,0.5);}

/* ── ナビ ── */
.nav{display:flex;background:#fff;border-bottom:2px solid var(--bg3);flex-shrink:0;}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:11px;color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--green);border-bottom-color:var(--green);background:rgba(30,132,73,0.08);}

/* ── ページ ── */
.pages{flex:1;overflow:hidden;position:relative;}
.page{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page.active{display:block;}
.inner{padding:10px;}
.sec{font-family:'Oswald',sans-serif;font-size:15px;color:var(--green);padding:8px 0 6px;border-bottom:2px solid var(--bg3);margin-bottom:8px;}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.empty{text-align:center;padding:40px 20px;color:#aaa;}

/* ── スコアページ ── */
.score-page{display:flex;flex-direction:column;height:100%;}
.stbl-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.stbl{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
.stbl thead th{background:var(--green);color:#fff;padding:6px 3px;text-align:center;font-size:11px;border:1px solid rgba(255,255,255,0.15);position:sticky;top:0;z-index:5;}
.stbl thead th.hcol{background:var(--gold);color:#1a1a1a;left:0;z-index:6;min-width:30px;}
.stbl td{padding:2px;text-align:center;border:1px solid #ddd;vertical-align:middle;}
.stbl tbody tr:nth-child(even) td{background:#f8f9fa;}
.stbl td.hcell{background:#f0f2f5;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--gold);position:sticky;left:0;z-index:4;}
.stbl tr.sub td{background:#e8f5ed;color:#1a1a1a;font-weight:700;font-size:13px;border:1px solid #b2dfdb;}
.stbl tr.sub td.hcell{background:var(--green);color:#fff;}
.stbl tr.tot td{background:#c8e6c9;color:#1a1a1a;font-weight:700;font-size:14px;border:1px solid #a5d6a7;}
.stbl tr.tot td.hcell{background:var(--green);color:#fff;}
.stbl tr.putt-row td{background:#e8f4fd;}
.stbl tr.putt-row td.hcell{background:#d6eaf8;}

/* スコア入力 */
.par-inp{width:34px;height:28px;background:transparent;border:none;text-align:center;font-size:13px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;-moz-appearance:textfield;}
.par-inp::-webkit-inner-spin-button{display:none;}
.par-inp:focus{outline:1px solid var(--gold);border-radius:3px;}
.sc-inp{width:44px;height:38px;background:#f8f9fa;border:1.5px solid #ccc;border-radius:5px;text-align:center;font-size:17px;font-weight:700;color:#1a1a1a;font-family:'Oswald',sans-serif;-moz-appearance:textfield;}
.sc-inp::-webkit-inner-spin-button{display:none;}
.sc-inp:focus{outline:none;border-color:var(--gold);}
.sc-inp.eagle{background:#3a2800;border-color:#f39c12;color:#f39c12;}
.sc-inp.birdie{background:#3a1a1a;border-color:#e74c3c;color:#e74c3c;}
.sc-inp.par{background:#1a3a22;border-color:#2ecc71;color:#2ecc71;}
.sc-inp.bogey{background:#1a2a3a;border-color:#3498db;color:#3498db;}
.sc-inp.double{background:#2a1a3a;border-color:#9b59b6;color:#9b59b6;}
.sc-inp.triple{background:#3a1a1a;border-color:#c0392b;color:#c0392b;}
.pt-inp{width:34px;height:26px;background:#e8f4fd;border:1px solid #85c1e9;border-radius:4px;text-align:center;font-size:13px;font-weight:600;color:var(--blue);font-family:'Oswald',sans-serif;-moz-appearance:textfield;}
.pt-inp::-webkit-inner-spin-button{display:none;}
.pt-inp{color:#1a6b9a;}.pt-inp:focus{outline:none;border-color:var(--blue);}
.over-cell{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;min-width:28px;}

/* サマリー */
.summary{background:#fff;border-top:2px solid var(--bg3);display:flex;flex-shrink:0;}
.ss{flex:1;text-align:center;padding:4px 3px;border-right:1px solid #eee;}
.ss:last-child{border-right:none;}
.ss-name{font-size:9px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ss-g{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;line-height:1.1;}
.ss-d{font-size:10px;color:var(--g1);font-weight:600;}

/* ── オリンピック ── */
.otbl-wrap{overflow-x:auto;margin-bottom:12px;}
.otbl{width:100%;border-collapse:collapse;font-size:12px;}
.otbl thead th{background:var(--green);color:#fff;padding:4px 2px;text-align:center;font-size:10px;border:1px solid rgba(255,255,255,0.15);}
.otbl thead th.hcol{background:var(--gold);color:#1a1a1a;position:sticky;left:0;z-index:6;min-width:24px;font-size:10px;}
.otbl td{padding:1px 0;text-align:center;border:1px solid #ddd;background:#fff;vertical-align:middle;color:#1a1a1a;font-size:11px;}
.otbl tbody tr:nth-child(even) td{background:#f0f7f3;}
.otbl td.hcell{background:#f0f7f3;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--green);position:sticky;left:0;z-index:4;border-right:2px solid #ccc;}
.otbl tr.osub td{background:#e8f5ed;color:#1a1a1a;font-weight:700;border:1px solid #b2dfdb;}
.otbl tr.osub td.hcell{background:var(--green);color:#fff;}
.otbl tr.otot td{background:#c8e6c9;color:#1a1a1a;font-weight:700;font-size:14px;border:1px solid #a5d6a7;}
.otbl tr.otot td.hcell{background:var(--green);color:#fff;}
.oi{width:44px;height:36px;background:#f8f9fa;border:1.5px solid #ccc;border-radius:5px;text-align:center;font-size:14px;font-weight:700;color:#1a1a1a;font-family:'Oswald',sans-serif;-moz-appearance:textfield;}

.oi::-webkit-inner-spin-button{display:none;}
.oi:focus{outline:none;border-color:var(--gold);}
.oi.pos{border-color:#2ecc71;background:#1a3a22;color:#2ecc71;}
.oi.neg{border-color:var(--red);background:#3a1a1a;color:var(--red);}
.pp{color:#2ecc71;font-weight:700;}.pm{color:var(--red);font-weight:700;}.pz{color:var(--g2);}.pn{color:var(--bg3);}
.rtbl{width:100%;border-collapse:collapse;font-size:13px;}
.rtbl thead th{background:var(--green);color:#fff;padding:7px 5px;text-align:center;font-size:11px;}
.rtbl td{padding:8px 5px;text-align:center;border-bottom:1px solid var(--bg3);}
.rtbl tbody tr:last-child td{border-bottom:none;}
.pnm{text-align:left !important;padding-left:10px !important;font-weight:600;}
.rb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-weight:700;font-size:11px;}
.r1{background:var(--gold);color:#1a1a1a;}.r2{background:#888;color:#fff;}.r3{background:#cd7f32;color:#fff;}

/* ── 履歴 ── */
.rc{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.1);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.rch{background:linear-gradient(90deg,var(--green),#1a4a2e);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.rct{font-weight:700;font-size:14px;}
.rcd{font-size:11px;opacity:.8;}
.rcb{padding:10px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.rst{text-align:center;}
.rsv{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--gold);}
.rsl{font-size:10px;color:var(--g1);}
.rca{margin-left:auto;display:flex;gap:6px;}
.rcs{font-size:10px;color:var(--g2);padding:2px 12px 8px;}

/* ── 統計 ── */
.chips{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 10px;}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;border:1px solid #ddd;background:#f0f2f5;cursor:pointer;color:#555;}
.chip.active{background:var(--green);border-color:var(--green);color:#fff;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.sbox{text-align:center;padding:9px;background:#f0f2f5;border-radius:8px;}
.sv{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--gold);}
.sl{font-size:10px;color:var(--g1);margin-top:2px;}
.bar{display:flex;align-items:flex-end;gap:4px;height:60px;margin:8px 0;}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bf{width:100%;border-radius:3px 3px 0 0;}
.bl{font-size:9px;color:var(--g1);text-align:center;line-height:1.2;}
.bv{font-size:9px;font-weight:700;}

/* ── ゴルフ場登録 ── */
.vtbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:6px;}
.vtbl th{background:var(--green);color:#fff;padding:6px 10px;text-align:center;font-size:11px;border:1px solid rgba(255,255,255,0.2);}
.vtbl td{padding:5px 8px;text-align:center;border:1px solid #ddd;background:#fff;}
.vtbl tbody tr:nth-child(even) td{background:#f8f9fa;}
.vtbl tfoot td{background:#e8f5ed;color:#1a1a1a;font-weight:700;color:var(--gold);font-family:'Oswald',sans-serif;}
.cpi{width:50px;height:32px;background:#f8f9fa;border:1px solid #ccc;color:#1a1a1a;border-radius:4px;text-align:center;font-size:14px;font-weight:700;font-family:'Oswald',sans-serif;-moz-appearance:textfield;}
.cpi::-webkit-inner-spin-button{display:none;}
.cpi:focus{outline:none;border-color:var(--gold);}
.gcc{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.1);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.gcch{background:linear-gradient(90deg,var(--green),#1a4a2e);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;}
.gccn{font-weight:700;font-size:14px;color:#fff;}
.gccr{background:#f0f7f3;border-radius:6px;margin:6px;padding:8px 10px;}
.gpr{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;}
.gpc{text-align:center;flex-shrink:0;min-width:26px;}
.gpnl{font-size:9px;color:#666;}
.gpv{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:#1a1a1a;}
.gsub{font-size:11px;color:#555;margin-top:3px;}

/* ── モーダル ── */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:14px;}
.mov.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:420px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6);border:1px solid var(--bg3);}
.mhdr{background:var(--green);color:#fff;padding:12px 16px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:center;}
.mttl{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;}
.mx{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;line-height:1;padding:0 4px;}
.mbody{padding:14px 16px;}
.mftr{padding:10px 16px;border-top:1px solid var(--bg3);display:flex;gap:8px;justify-content:flex-end;}

/* フォーム */
.flbl{font-size:12px;color:#555;margin-bottom:4px;display:block;}
.fi{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;background:#f8f9fa;margin-bottom:10px;}
.fi:focus{outline:none;border-color:var(--green);background:#fff;}
.fsel{width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;color:#1a1a1a;font-family:'Noto Sans JP',sans-serif;background:#f8f9fa;margin-bottom:10px;}
.fsel:focus{outline:none;border-color:var(--green);}
.frow{display:flex;gap:8px;}.frow>div{flex:1;}

/* ボタン */
.btn{padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;}
.btn-g{background:var(--gold);color:#1a1a1a;}
.btn-o{background:#fff;border:1.5px solid #ccc;color:#555;}
.btn-gr{background:var(--green);color:#fff;}
.bsm{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans JP',sans-serif;}
.bsm-g{background:var(--green);color:#fff;}
.bsm-r{background:#3a1a1a;color:var(--red);border:1px solid #5a2a2a;}

/* トースト */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="hdr">
  <div>
    <div class="hdr-logo">⛳ Golynpic</div>
    <div class="hdr-sub" id="hdr-course">-</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn" id="hist-btn" onclick="showPage('history')">📋 履歴</button>
    <button class="hbtn solid" onclick="openNewRound()">＋ 新規ラウンド</button>
    <button class="hbtn" id="reg-btn" onclick="showPage('course')">⛳ ゴルフ場登録</button>
  </div>
</div>

<!-- ナビ -->
<div class="nav">
  <div class="tab active" onclick="showPage('score')">🏌️ スコア</div>
  <div class="tab" onclick="showPage('olympic')">🏅 オリンピック</div>
  <div class="tab" onclick="showPage('stats')">📊 統計</div>
</div>

<div class="pages">

  <!-- スコア -->
  <div id="page-score" class="page active">
    <div class="score-page">
      <div style="background:var(--bg2);padding:6px 12px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px;flex-shrink:0;">
        <button id="putt-btn" onclick="togglePutt()"
          style="border:1px solid var(--g3);color:var(--g2);background:transparent;padding:5px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">
          🏌️ パット 非表示
        </button>
        <span style="font-size:11px;color:var(--g2);">タップでパット入力の表示切替</span>
      </div>
      <div class="stbl-wrap">
        <table class="stbl" id="stbl"></table>
      </div>
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <!-- オリンピック -->
  <div id="page-olympic" class="page">
    <div class="inner">
      <div class="card" style="display:flex;align-items:center;gap:12px;padding:10px 14px;">
        <div>
          <label class="flbl" style="margin-bottom:2px;">単価（円/pt）</label>
          <input type="number" id="unit-price" value="100" min="1"
            style="width:88px;padding:6px 8px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;color:#1a1a1a;background:#f8f9fa;"
            oninput="renderOlySummary()">
        </div>
        <div style="font-size:11px;color:#666;">スコアタブと独立して入力。未入力は0として計算。</div>
      </div>
      <div class="otbl-wrap"><table class="otbl" id="otbl"></table></div>
      <div class="sec">🏆 順位・収支</div>
      <div style="overflow-x:auto;"><table class="rtbl" id="rtbl"></table></div>
    </div>
  </div>

  <!-- 履歴 -->
  <div id="page-history" class="page">
    <div class="inner">
      <div class="sec">📋 ラウンド履歴</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <!-- 統計 -->
  <div id="page-stats" class="page">
    <div class="inner">
      <div class="chips" id="stat-chips"></div>
      <div class="card">
        <div style="font-weight:700;color:var(--gold);font-size:13px;">スコア分布</div>
        <div class="bar" id="stat-bar"></div>
        <div class="sgrid" id="stat-grid"></div>
      </div>
      <div class="card">
        <div style="font-weight:700;color:var(--gold);font-size:13px;margin-bottom:8px;">ホール別</div>
        <div id="stat-detail"></div>
      </div>
    </div>
  </div>

  <!-- ゴルフ場登録 -->
  <div id="page-course" class="page">
    <div class="inner">
      <div class="sec">⛳ ゴルフ場登録</div>
      <div class="card">
        <div style="font-family:'Oswald',sans-serif;font-size:15px;color:var(--green);margin-bottom:10px;" id="cf-ttl">新規登録</div>
        <label class="flbl">ゴルフ場名</label>
        <input class="fi" type="text" id="cf-name" placeholder="例：よみうりゴルフ倶楽部">

        <div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:6px;">前半（H1〜H9）</div>
        <label class="flbl">コース名</label>
        <input class="fi" type="text" id="cf-out-name" placeholder="例：OUT">
        <table class="vtbl">
          <thead><tr><th>ホール</th><th>PAR</th></tr></thead>
          <tbody id="vtbl-out"></tbody>
          <tfoot><tr><td style="text-align:right;padding-right:8px;">計</td><td id="cf-out-sum">36</td></tr></tfoot>
        </table>

        <div style="font-size:12px;color:var(--green);font-weight:600;margin:12px 0 6px;">後半（H10〜H18）</div>
        <label class="flbl">コース名</label>
        <input class="fi" type="text" id="cf-in-name" placeholder="例：IN">
        <table class="vtbl">
          <thead><tr><th>ホール</th><th>PAR</th></tr></thead>
          <tbody id="vtbl-in"></tbody>
          <tfoot><tr><td style="text-align:right;padding-right:8px;">計</td><td id="cf-in-sum">36</td></tr></tfoot>
        </table>

        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn btn-g" onclick="saveCourse()" style="flex:1;">💾 保存</button>
          <button class="btn btn-o" onclick="resetCf()" style="flex:1;">リセット</button>
        </div>
      </div>
      <div class="sec">📋 登録済み</div>
      <div id="gc-list"></div>
    </div>
  </div>

</div>

<!-- 新規ラウンドモーダル -->
<div class="mov" id="modal-new">
  <div class="modal">
    <div class="mhdr">
      <div class="mttl">⛳ 新規ラウンド</div>
      <button class="mx" onclick="document.getElementById('modal-new').classList.remove('open')">×</button>
    </div>
    <div class="mbody">
      <label class="flbl">ゴルフ場を選択（登録済み）</label>
      <select class="fsel" id="sel-club" onchange="onClubChange()">
        <option value="">-- ゴルフ場を選択 --</option>
      </select>
      <label class="flbl">ゴルフ場を入力（手入力の場合）</label>
      <input class="fi" type="text" id="new-course" placeholder="例：よみうりゴルフ倶楽部" oninput="onCourseManualInput()">
      <label class="flbl">前半コース</label>
      <select class="fsel" id="sel-out" onchange="onCourseChange()">
        <option value="">-- 前半コース --</option>
      </select>
      <label class="flbl">後半コース</label>
      <select class="fsel" id="sel-in" onchange="onCourseChange()">
        <option value="">-- 後半コース --</option>
      </select>
      <div class="frow">
        <div>
          <label class="flbl">日付</label>
          <input class="fi" type="date" id="new-date">
        </div>
        <div>
          <label class="flbl">ホール数</label>
          <select class="fsel" id="new-holes">
            <option value="18">18ホール</option>
            <option value="9">9ホール</option>
          </select>
        </div>
      </div>
      <div style="font-weight:700;color:var(--gold);margin-bottom:8px;">プレイヤー（最大4名）</div>
      <input class="fi" type="text" id="p0" placeholder="プレイヤー1">
      <input class="fi" type="text" id="p1" placeholder="プレイヤー2">
      <input class="fi" type="text" id="p2" placeholder="プレイヤー3">
      <input class="fi" type="text" id="p3" placeholder="プレイヤー4">
    </div>
    <div class="mftr">
      <button class="btn btn-o" onclick="document.getElementById('modal-new').classList.remove('open')">キャンセル</button>
      <button class="btn btn-g" onclick="createRound()">開始 ▶</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONSTANTS =====
const SKEY  = 'golynpic_v1';
const CKEY  = 'golynpic_courses_v1';
const DPARS = [4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4];

// ===== STATE =====
let G = {
  id:null, course:'', date:'', holes:18,
  players:[], pars:[...DPARS],
  scores:null, putts:null, oly:null,
  showPutt:false, history:[], statsP:0
};
let scoreTimers = {};
let olyTimers = {};

function initData() {
  const h=G.holes, n=G.players.length;
  G.scores = Array.from({length:h},()=>Array(n).fill(null));
  G.putts  = Array.from({length:h},()=>Array(n).fill(null));
  G.oly    = Array.from({length:h},()=>Array(n).fill(null));
}

// ===== 永続化 =====
function persist() {
  try {
    localStorage.setItem(SKEY, JSON.stringify({
      history: G.history,
      cur: {
        id:G.id, course:G.course, date:G.date, holes:G.holes,
        players:G.players, pars:G.pars,
        scores:G.scores, putts:G.putts, oly:G.oly,
        showPutt:G.showPutt, statsP:G.statsP
      }
    }));
  } catch(e) {}
}

function loadSaved() {
  try {
    const d = JSON.parse(localStorage.getItem(SKEY) || 'null');
    if (!d) return;
    if (d.history) G.history = d.history;
    if (d.cur) {
      const c = d.cur;
      G.id=c.id||null; G.course=c.course||''; G.date=c.date||'';
      G.holes=c.holes||18; G.players=c.players||[]; G.pars=c.pars||[...DPARS];
      G.scores=c.scores||null; G.putts=c.putts||null; G.oly=c.oly||null;
      G.showPutt=c.showPutt||false; G.statsP=c.statsP||0;
      if (!G.scores) initData();
    }
  } catch(e) {}
}

function saveToHistory() {
  const e = {
    id:G.id||Date.now(), course:G.course, date:G.date, holes:G.holes,
    players:[...G.players], pars:[...G.pars],
    scores:G.scores.map(r=>[...r]), putts:G.putts.map(r=>[...r]),
    oly:G.oly.map(r=>[...r]), savedAt:new Date().toISOString()
  };
  G.id = e.id;
  const i = G.history.findIndex(h=>h.id===e.id);
  if (i>=0) G.history[i]=e; else G.history.unshift(e);
  persist();
  toast('💾 保存しました');
}

function loadEntry(id) {
  const e = G.history.find(h=>h.id===id);
  if (!e) return;
  G.id=e.id; G.course=e.course; G.date=e.date; G.holes=e.holes;
  G.players=[...e.players]; G.pars=[...e.pars];
  G.scores=e.scores.map(r=>[...r]);
  G.putts=e.putts ? e.putts.map(r=>[...r]) : Array.from({length:e.holes},()=>Array(e.players.length).fill(null));
  G.oly=e.oly ? e.oly.map(r=>[...r]) : Array.from({length:e.holes},()=>Array(e.players.length).fill(null));
  G.statsP=0;
  document.getElementById('hdr-course').textContent = G.course||'-';
  renderScore(); showPage('score');
  toast('📂 読み込みました');
}

function delEntry(id) {
  if (!confirm('削除しますか？')) return;
  G.history = G.history.filter(h=>h.id!==id);
  persist(); renderHist(); toast('🗑️ 削除しました');
}

// ===== ナビ =====
const PG = {score:0, olympic:1, history:99, stats:2, course:99};
function showPage(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if (PG[p] < 4) document.querySelectorAll('.tab')[PG[p]].classList.add('active');
  // ヘッダーボタンのハイライト
  const regBtn = document.getElementById('reg-btn');
  if (regBtn) {
    regBtn.style.background = p==='course' ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.15)';
    regBtn.style.fontWeight = p==='course' ? '900' : '700';
  }
  const histBtn = document.getElementById('hist-btn');
  if (histBtn) {
    histBtn.style.background = p==='history' ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.15)';
    histBtn.style.fontWeight = p==='history' ? '900' : '700';
  }
  if (p==='score')   renderScore();
  if (p==='olympic') { renderOlyTbl(); renderOlySummary(); }
  if (p==='history') renderHist();
  if (p==='stats')   { renderStatChips(); renderStats(); }
  if (p==='course')  { buildVtbl(); renderGcList(); }
}

// ===== パット表示切替 =====
function togglePutt() {
  G.showPutt = !G.showPutt;
  updatePuttBtn();
  persist();
  renderScore();
}

function updatePuttBtn() {
  const btn = document.getElementById('putt-btn');
  if (!btn) return;
  if (G.showPutt) {
    btn.textContent = '🏌️ パット 表示中';
    btn.style.borderColor = 'var(--blue)';
    btn.style.color = '#fff';
    btn.style.background = 'var(--blue)';
  } else {
    btn.textContent = '🏌️ パット 非表示';
    btn.style.borderColor = 'var(--g3)';
    btn.style.color = 'var(--g2)';
    btn.style.background = 'transparent';
  }
}

// ===== スコア =====
function sClass(s, par) {
  if (s===null) return '';
  const d=s-par;
  if (d<=-2) return 'eagle';
  if (d===-1) return 'birdie';
  if (d===0)  return 'par';
  if (d===1)  return 'bogey';
  if (d===2)  return 'double';
  return 'triple';
}

function renderScore() { renderStbl(); renderSummary(); }

function renderStbl() {
  if (!G.players.length) { document.getElementById('stbl').innerHTML=''; return; }
  const n=G.players.length, h=G.holes;

  // ヘッダー：プレイヤー名（スコア+オーバー の2列）
  let html = '<thead>'
    + '<tr><th class="hcol">H</th>'
    + '<th style="background:#1a3a2e;color:#fff;min-width:34px;">PAR</th>'
    + G.players.map(p=>`<th colspan="2" style="min-width:72px;font-size:11px;">${p}</th>`).join('')
    + '</tr>'
    + '<tr><th class="hcol"></th><th style="background:#1a3a2e;"></th>'
    + G.players.map(()=>'<th style="font-size:10px;min-width:44px;">Score</th><th style="font-size:10px;min-width:28px;color:#9b59b6;">±</th>').join('')
    + '</tr></thead><tbody>';

  function half(start, end, label) {
    for (let hi=start; hi<end; hi++) {
      const par = G.pars[hi];
      // スコア行
      html += `<tr><td class="hcell">${hi+1}</td>`
        + `<td style="background:#1a3a2e;"><input class="par-inp" type="number" min="3" max="6" value="${par}" oninput="setPar(this,${hi})" onfocus="this.select()"></td>`;
      for (let pi=0; pi<n; pi++) {
        const s = G.scores[hi][pi];
        const ov = s!==null ? s-par : null;
        const ovStr = ov===null?'':ov===0?'E':ov>0?'+'+ov:''+ov;
        const ovCol = ov===null?'var(--g2)':ov<0?'#e74c3c':ov===0?'#2ecc71':'#3498db';
        html += `<td><input class="sc-inp ${sClass(s,par)}" type="number" min="1" max="20" value="${s!==null?s:''}" placeholder="-" oninput="onSc(this,${hi},${pi})" onfocus="this.select()"></td>`;
        html += `<td class="over-cell" id="ov_${hi}_${pi}" style="color:${ovCol};">${ovStr}</td>`;
      }
      html += '</tr>';
      // パット行（showPuttのみ）
      if (G.showPutt) {
        html += `<tr class="putt-row"><td class="hcell" style="font-size:9px;color:var(--blue);">P</td><td style="font-size:9px;color:var(--g2);">putt</td>`;
        for (let pi=0; pi<n; pi++) {
          const pt = G.putts[hi][pi];
          html += `<td colspan="2"><input class="pt-inp" type="number" min="0" max="10" value="${pt!==null?pt:''}" placeholder="-" oninput="onPt(this,${hi},${pi})" onfocus="this.select()"></td>`;
        }
        html += '</tr>';
      }
    }
    // スコア小計
    html += `<tr class="sub"><td class="hcell">${label}</td><td>${G.pars.slice(start,end).reduce((a,b)=>a+b,0)}</td>`;
    for (let pi=0; pi<n; pi++) {
      const en = G.scores.slice(start,end).filter((r,i)=>r[pi]!==null);
      const sub = en.length ? en.reduce((a,r)=>a+r[pi],0) : null;
      // 入力済みホールのPAR合計でオーバー数を計算
      const parS = G.pars.slice(start,end).reduce((a,b,i)=>
        G.scores[start+i][pi]!==null ? a+b : a, 0);
      const ov = sub!==null ? sub-parS : null;
      const ovStr = ov===null?'-':ov===0?'E':ov>0?'+'+ov:''+ov;
      // sub行は緑背景: スコア合計(小)・オーバー数(大)とも白で表示
      const ovCol = ov===null?'#999':ov<0?'#27ae60':ov===0?'#7f8c8d':'#e67e22';
      html += `<td id="sub_${label}_${pi}" style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:#fff;background:var(--green);border-radius:4px;">${sub!==null?sub:'-'}</td>`;
      html += `<td id="subov_${label}_${pi}" style="font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#1a1a1a;">${ovStr}</td>`;
    }
    html += '</tr>';
    // パット小計（showPuttのみ）
    if (G.showPutt) {
      html += `<tr class="sub" style="background:#1a1a4a;"><td class="hcell" style="font-size:10px;color:var(--blue);">P</td><td style="font-size:10px;color:var(--g2);">putt</td>`;
      for (let pi=0; pi<n; pi++) {
        const en = G.putts.slice(start,end).filter(r=>r[pi]!==null);
        const sub = en.length ? en.reduce((a,r)=>a+r[pi],0) : null;
        html += `<td colspan="2" id="psub_${label}_${pi}" style="font-size:13px;color:var(--blue);">${sub!==null?sub:'-'}</td>`;
      }
      html += '</tr>';
    }
  }

  half(0, Math.min(9,h), 'OUT');
  if (h>9) half(9, h, 'IN');

  // TOTAL スコア
  html += '<tr class="tot"><td class="hcell">TOT</td><td>'+G.pars.slice(0,h).reduce((a,b)=>a+b,0)+'</td>';
  for (let pi=0; pi<n; pi++) {
    const any = G.scores.some(r=>r[pi]!==null);
    const tot = G.scores.reduce((a,r)=>a+(r[pi]||0),0);
    // 入力済みホールのPAR合計でオーバー数を計算
    const parT = G.pars.slice(0,h).reduce((a,b,i)=>
      G.scores[i][pi]!==null ? a+b : a, 0);
    const ov = any ? tot-parT : null;
    const ovStr = ov===null?'-':ov===0?'E':ov>0?'+'+ov:''+ov;
    // tot行は暗緑背景: 白で表示
    const ovCol = ov===null?'#999':ov<0?'#27ae60':ov===0?'#7f8c8d':'#e67e22';
    html += `<td id="tot_${pi}" style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#fff;background:var(--green);border-radius:4px;">${any?tot:'-'}</td>`;
    html += `<td id="totov_${pi}" style="font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;color:#1a1a1a;">${ovStr}</td>`;
  }
  html += '</tr>';
  // TOTAL パット（showPuttのみ）
  if (G.showPutt) {
    html += '<tr class="tot" style="background:#12122a;"><td class="hcell" style="font-size:10px;color:var(--blue);">P</td><td style="font-size:10px;color:var(--g2);">合計</td>';
    for (let pi=0; pi<n; pi++) {
      const any = G.putts.some(r=>r[pi]!==null);
      const tot = G.putts.reduce((a,r)=>a+(r[pi]||0),0);
      html += `<td colspan="2" id="ptot_${pi}" style="font-size:14px;color:var(--blue);">${any?tot:'-'}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('stbl').innerHTML = html;
}

function setPar(inp, hi) {
  const v=parseInt(inp.value);
  if (!isNaN(v)&&v>=1) { G.pars[hi]=v; renderStbl(); renderSummary(); persist(); }
}

function onSc(inp, hi, pi) {
  const key=`${hi}_${pi}`;
  clearTimeout(scoreTimers[key]);
  const raw=inp.value;
  if (raw==='') { G.scores[hi][pi]=null; inp.className='sc-inp'; refreshTot(); renderSummary(); persist(); return; }
  const v=parseInt(raw);
  if (isNaN(v)) return;
  if (raw.length>=2||v>=7) { applySc(inp,hi,pi,v); }
  else { scoreTimers[key]=setTimeout(()=>applySc(inp,hi,pi,parseInt(inp.value)),600); }
}

function applySc(inp, hi, pi, v) {
  G.scores[hi][pi] = (!v||v<1) ? null : v;
  inp.className = 'sc-inp '+sClass(G.scores[hi][pi], G.pars[hi]);
  // オーバー数セル更新
  const s=G.scores[hi][pi], par=G.pars[hi];
  const ov=s!==null?s-par:null;
  const el=document.getElementById('ov_'+hi+'_'+pi);
  if (el) {
    el.textContent=ov===null?'':ov===0?'E':ov>0?'+'+ov:''+ov;
    el.style.color=ov===null?'var(--g2)':ov<0?'#e74c3c':ov===0?'#2ecc71':'#3498db';
  }
  refreshTot(); renderSummary(); persist();
}

function onPt(inp, hi, pi) {
  const v=parseInt(inp.value);
  G.putts[hi][pi] = isNaN(v)||v<0 ? null : v;
  refreshPuttTot(); persist();
}

function refreshTot() {
  const n=G.players.length, h=G.holes, out=Math.min(9,h);
  for (let pi=0; pi<n; pi++) {
    const upd=(lbl,s,e)=>{
      const en=G.scores.slice(s,e).filter(r=>r[pi]!==null);
      const sub=en.length?en.reduce((a,r)=>a+r[pi],0):null;
      const parS=G.pars.slice(s,e).reduce((a,b,i)=>
        G.scores[s+i][pi]!==null?a+b:a,0);
      const ov=sub!==null?sub-parS:null;
      const ovStr=ov===null?'-':ov===0?'E':ov>0?'+'+ov:''+ov;
      const ovCol=ov===null?'var(--g2)':ov<0?'#e74c3c':ov===0?'#2ecc71':'#3498db';
      const subOvCol=ov===null?'#999':ov<0?'#27ae60':ov===0?'#7f8c8d':'#e67e22';
      const el=document.getElementById(`sub_${lbl}_${pi}`); if(el){el.textContent=sub!==null?sub:'-';el.style.color='#fff';el.style.background='var(--green)';el.style.borderRadius='4px';el.style.fontSize='20px';el.style.fontFamily="'Oswald',sans-serif";}
      const oel=document.getElementById(`subov_${lbl}_${pi}`); if(oel){oel.textContent=ovStr;oel.style.color='#1a1a1a';}
    };
    upd('OUT',0,out);
    if (h>9) upd('IN',9,h);
    const any=G.scores.some(r=>r[pi]!==null);
    const tot=G.scores.reduce((a,r)=>a+(r[pi]||0),0);
    const parT=G.pars.slice(0,h).reduce((a,b,i)=>
      G.scores[i][pi]!==null?a+b:a,0);
    const ov=any?tot-parT:null;
    const ovStr=ov===null?'-':ov===0?'E':ov>0?'+'+ov:''+ov;
    const ovCol=ov===null?'var(--g2)':ov<0?'#e74c3c':ov===0?'#2ecc71':'#3498db';
    const t=document.getElementById('tot_'+pi); if(t) t.textContent=any?tot:'-';
    const ot=document.getElementById('totov_'+pi); if(ot){ot.textContent=ovStr;ot.style.color=ovCol;}
  }
}

function refreshPuttTot() {
  const n=G.players.length, h=G.holes, out=Math.min(9,h);
  for (let pi=0; pi<n; pi++) {
    const calc=(s,e)=>{const en=G.putts.slice(s,e).filter(r=>r[pi]!==null);return en.length?en.reduce((a,r)=>a+r[pi],0):null;};
    const o=document.getElementById('psub_OUT_'+pi); if(o){const v=calc(0,out);o.textContent=v!==null?v:'-';}
    if(h>9){const i=document.getElementById('psub_IN_'+pi);if(i){const v=calc(9,h);i.textContent=v!==null?v:'-';}}
    const t=document.getElementById('ptot_'+pi);
    if(t){const any=G.putts.some(r=>r[pi]!==null);const tot=G.putts.reduce((a,r)=>a+(r[pi]||0),0);t.textContent=any?tot:'-';}
  }
}

function renderSummary() {
  let html='';
  G.players.forEach((name,pi)=>{
    const ent=G.scores.map((r,hi)=>({s:r[pi],par:G.pars[hi]})).filter(x=>x.s!==null);
    const g=ent.reduce((a,x)=>a+x.s,0), p=ent.reduce((a,x)=>a+x.par,0);
    const d=g-p, any=ent.length>0;
    const ds=any?(d===0?'E':d>0?'+'+d:''+d):'-';
    html+=`<div class="ss"><div class="ss-name">${name}</div><div class="ss-g">${any?g:'-'}</div><div class="ss-d">${ds}</div></div>`;
  });
  document.getElementById('summary').innerHTML=html;
}

// ===== オリンピック =====
function calcOly(row) {
  const n=row.length;
  const pts=Array(n).fill(null);
  // 全員nullなら計算しない
  if (row.every(v=>v===null)) return pts;
  // 未入力は0として計算
  const vals=row.map(v=>v===null?0:v);
  for(let pi=0;pi<n;pi++){
    const oth=vals.filter((_,i)=>i!==pi);
    pts[pi]=vals[pi]*oth.length-oth.reduce((a,b)=>a+b,0);
  }
  return pts;
}
function subPts(s,e,pi){
  let t=0,any=false;
  for(let hi=s;hi<e;hi++){
    const p=calcOly(G.oly[hi]);
    if(p[pi]!==null){t+=p[pi];any=true;}
  }
  return any?t:null;
}
function fp(v){
  // テーブル内：下2桁省略（例：¥1,400→¥14）
  if(v===null) return '<span class="pn">-</span>';
  const unit=parseInt(document.getElementById('unit-price')?.value)||100;
  const yen=(-v)*unit;
  if(v===0) return '<span class="pz">0</span>';
  const short=Math.round(yen/100); // 下2桁省略
  return yen>0
    ? `<span class="pm">-¥${short}</span>`
    : `<span class="pp">+¥${(-short)}</span>`;
}

function fpFull(v, unit){
  // 順位・収支テーブル用：省略なし
  if(v===null) return '<span style="color:var(--g2)">-</span>';
  const yen=(-v)*unit;
  if(v===0) return '<span style="color:var(--g2)">0円</span>';
  return yen>0
    ? `<span class="pm">-¥${yen.toLocaleString()}</span>`
    : `<span class="pp">+¥${(-yen).toLocaleString()}</span>`;
}

function renderOlyTbl() {
  if (!G.players.length){document.getElementById('otbl').innerHTML='';return;}
  const n=G.players.length, h=G.holes;
  // ヘッダー：H列 + プレイヤースコア列 + プレイヤーpt列
  let html='<thead><tr><th class="hcol">H</th>'
    +G.players.map(p=>`<th style="font-size:10px;min-width:44px;">${p}</th>`).join('')
    +G.players.map(p=>`<th style="font-size:10px;background:#d5e8d4;color:#1a1a1a;min-width:44px;">${p}<br>¥</th>`).join('')
    +'</tr></thead><tbody>';
  function half(s,e,lbl){
    for(let hi=s;hi<e;hi++){
      const row=G.oly[hi], pts=calcOly(row);
      html+=`<tr><td class="hcell" style="min-width:24px;font-size:12px;">${hi+1}</td>`;
      for(let pi=0;pi<n;pi++){
        const v=row[pi], cls=v!==null?(v<0?'neg':'pos'):'';
        html+=`<td><input class="oi ${cls}" type="text" inputmode="numeric" id="oi_${hi}_${pi}" value="${v!==null?v:''}" placeholder="0" oninput="onOly(this,${hi},${pi})" onfocus="this.select()"></td>`;
      }
      for(let pi=0;pi<n;pi++) html+=`<td id="op_${hi}_${pi}">${fp(pts[pi])}</td>`;
      html+='</tr>';
    }
    // スコア小計（入力値の合計）
    const scSub=Array(n).fill(0).map((_,pi)=>{
      let t=0,any=false;
      for(let hi=s;hi<e;hi++){const v=G.oly[hi][pi];if(v!==null){t+=v;any=true;}}
      return any?t:null;
    });
    html+=`<tr class="osub"><td class="hcell">${lbl}</td>`
      +scSub.map(v=>`<td style="font-weight:700;color:#1a1a1a;font-size:14px;">${v!==null?v:'-'}</td>`).join('')
      +G.players.map((_,pi)=>`<td id="os_${lbl}_${pi}">${fp(subPts(s,e,pi))}</td>`).join('')
      +'</tr>';
  }
  half(0,Math.min(9,h),'OUT');
  if(h>9) half(9,h,'IN');
  // TOTスコア合計
  const scTot=Array(n).fill(0).map((_,pi)=>{
    let t=0,any=false;
    for(let hi=0;hi<h;hi++){const v=G.oly[hi][pi];if(v!==null){t+=v;any=true;}}
    return any?t:null;
  });
  html+='<tr class="otot"><td class="hcell">TOT</td>'
    +scTot.map(v=>`<td style="font-weight:700;color:#1a1a1a;font-size:15px;">${v!==null?v:'-'}</td>`).join('')
    +G.players.map((_,pi)=>`<td id="ot_${pi}">${fp(subPts(0,h,pi))}</td>`).join('')
    +'</tr></tbody>';
  document.getElementById('otbl').innerHTML=html;
}

function onOly(inp,hi,pi){
  const raw=inp.value.trim();
  const key=`${hi}_${pi}`;
  clearTimeout(olyTimers[key]);
  // 空欄
  if(raw===''){ G.oly[hi][pi]=null; applyOly(inp,hi,pi); return; }
  // "-"だけ入力中：タイマー待機してそのまま
  if(raw==='-'){ olyTimers[key]=setTimeout(()=>applyOly(inp,hi,pi),2000); return; }
  const n=parseInt(raw);
  if(isNaN(n)) return;
  // 絶対値が2桁以上はすぐ確定、1桁は1.5秒待機
  if(String(Math.abs(n)).length>=2){
    applyOly(inp,hi,pi);
  } else {
    olyTimers[key]=setTimeout(()=>applyOly(inp,hi,pi),1500);
  }
}

function applyOly(inp,hi,pi){
  const raw=inp.value;
  if(raw===''){ G.oly[hi][pi]=null; }
  else {
    const n=parseInt(raw);
    G.oly[hi][pi]=isNaN(n)?null:n;
  }
  const s=G.oly[hi][pi];
  inp.className='oi '+(s===null?'':(s<0?'neg':'pos'));
  const pts=calcOly(G.oly[hi]);
  G.players.forEach((_,p)=>{const el=document.getElementById(`op_${hi}_${p}`);if(el)el.innerHTML=fp(pts[p]);});
  refreshOlySubs(); renderOlySummary(); persist();
}

function refreshOlySubs(){
  const n=G.players.length,h=G.holes,out=Math.min(9,h);
  for(let pi=0;pi<n;pi++){
    const o=document.getElementById('os_OUT_'+pi);if(o)o.innerHTML=fp(subPts(0,out,pi));
    if(h>9){const i=document.getElementById('os_IN_'+pi);if(i)i.innerHTML=fp(subPts(9,h,pi));}
    const t=document.getElementById('ot_'+pi);if(t)t.innerHTML=fp(subPts(0,h,pi));
  }
  // スコア合計セルも更新（osub/otot行の最初の列）
  renderOlyTbl();
}

function renderOlySummary(){
  const unit=parseInt(document.getElementById('unit-price').value)||100;
  const n=G.players.length,h=G.holes,out=Math.min(9,h);
  const tots=G.players.map((_,pi)=>subPts(0,h,pi));
  const ranked=tots.map((p,i)=>({i,p})).sort((a,b)=>{if(a.p===null&&b.p===null)return 0;if(a.p===null)return 1;if(b.p===null)return -1;return a.p-b.p;});
  const fpp=v=>fpFull(v,unit);
  let html='<thead><tr><th>順位</th><th class="pnm">プレイヤー</th><th>OUT</th>'+(h>9?'<th>IN</th>':'')+'<th>合計</th><th>収支</th></tr></thead><tbody>';
  ranked.forEach(({i:pi},rank)=>{
    const badge=rank<3?`<span class="rb r${rank+1}">${rank+1}</span>`:rank+1;
    const tot=tots[pi],m=tot!==null?(-tot)*unit:null;
    const ms=m===null?'-':m>=0?`<span class="pp">+¥${m.toLocaleString()}</span>`:`<span class="pm">¥${m.toLocaleString()}</span>`;
    html+=`<tr><td>${badge}</td><td class="pnm">${G.players[pi]}</td><td>${fpp(subPts(0,out,pi))}</td>${h>9?`<td>${fpp(subPts(9,h,pi))}</td>`:''}<td style="font-weight:700;">${fpp(tot)}</td><td style="font-weight:700;">${ms}</td></tr>`;
  });
  document.getElementById('rtbl').innerHTML=html+'</tbody>';
}

// ===== 履歴 =====
function renderHist(){
  const el=document.getElementById('hist-list');
  if(!G.history.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:8px;">📋</div><div>履歴がありません</div></div>';return;}
  el.innerHTML=G.history.map(r=>{
    const p0=r.scores.map(row=>row[0]);
    const g=p0.reduce((a,s)=>a+(s||0),0),any=p0.some(s=>s!==null);
    const pt=r.pars.reduce((a,b)=>a+b,0),d=g-pt;
    const saved=r.savedAt?new Date(r.savedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="rc">
      <div class="rch"><div class="rct">⛳ ${r.course||'（未設定）'}</div><div class="rcd">${r.date}</div></div>
      <div class="rcb">
        <div class="rst"><div class="rsv">${any?g:'-'}</div><div class="rsl">${r.players[0]||'P1'} グロス</div></div>
        <div class="rst"><div class="rsv">${any?(d===0?'E':d>0?'+'+d:d):'-'}</div><div class="rsl">±PAR</div></div>
        <div class="rst"><div class="rsv">${r.holes}H</div><div class="rsl">${r.players.length}名</div></div>
        <div class="rca">
          <button class="bsm bsm-g" onclick="loadEntry(${r.id})">📂</button>
          <button class="bsm bsm-r" onclick="delEntry(${r.id})">🗑️</button>
        </div>
      </div>
      ${saved?`<div class="rcs">保存：${saved}</div>`:''}
    </div>`;
  }).join('');
}

// ===== 統計 =====
function renderStatChips(){
  document.getElementById('stat-chips').innerHTML=G.players.map((p,i)=>
    `<div class="chip ${i===G.statsP?'active':''}" onclick="selSP(${i})">${p}</div>`).join('');
}
function selSP(i){G.statsP=i;renderStatChips();renderStats();}
function renderStats(){
  const pi=G.statsP;
  let eagle=0,birdie=0,par=0,bogey=0,dbl=0,triple=0;
  G.scores.forEach((row,hi)=>{
    const s=row[pi];if(s===null)return;
    const d=s-G.pars[hi];
    if(d<=-2)eagle++;else if(d===-1)birdie++;else if(d===0)par++;else if(d===1)bogey++;else if(d===2)dbl++;else triple++;
  });
  const max=Math.max(eagle,birdie,par,bogey,dbl,triple,1);
  document.getElementById('stat-bar').innerHTML=[
    {l:'Eagle\n以下',v:eagle,c:'#f39c12'},{l:'Birdie',v:birdie,c:'#e74c3c'},
    {l:'Par',v:par,c:'#2ecc71'},{l:'Bogey',v:bogey,c:'#3498db'},
    {l:'Dbl',v:dbl,c:'#9b59b6'},{l:'Triple+',v:triple,c:'#c0392b'},
  ].map(b=>`<div class="bi"><div class="bv" style="color:${b.c}">${b.v||''}</div><div class="bf" style="height:${b.v/max*50}px;background:${b.c}"></div><div class="bl">${b.l}</div></div>`).join('');
  const g=G.scores.reduce((a,r)=>a+(r[pi]||0),0),any=G.scores.some(r=>r[pi]!==null);
  const putt=G.putts.reduce((a,r)=>a+(r[pi]||0),0),pany=G.putts.some(r=>r[pi]!==null);
  const played=eagle+birdie+par+bogey+dbl+triple;
  document.getElementById('stat-grid').innerHTML=`
    <div class="sbox"><div class="sv">${any?g:'-'}</div><div class="sl">グロス</div></div>
    <div class="sbox"><div class="sv">${played?Math.round(g/played*10)/10:'-'}</div><div class="sl">平均</div></div>
    <div class="sbox"><div class="sv">${par+birdie+eagle}</div><div class="sl">パー以下</div></div>
    <div class="sbox"><div class="sv">${bogey}</div><div class="sl">ボギー</div></div>
    <div class="sbox"><div class="sv">${dbl}</div><div class="sl">ダブル</div></div>
    <div class="sbox"><div class="sv">${pany?putt:'-'}</div><div class="sl">パット</div></div>`;
  let det='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;">'
    +'<tr style="background:var(--green);"><th style="padding:5px 8px;">H</th><th>PAR</th><th>Score</th><th>±</th></tr>';
  G.scores.forEach((row,hi)=>{
    const s=row[pi];if(s===null)return;
    const d=s-G.pars[hi],ds=d===0?'E':d>0?'+'+d:''+d;
    const cols={eagle:'#f39c12',birdie:'#e74c3c',par:'#2ecc71',bogey:'#3498db',double:'#9b59b6',triple:'#c0392b'};
    det+=`<tr style="border-bottom:1px solid var(--bg3);">
      <td style="padding:5px 8px;text-align:center;">${hi+1}</td>
      <td style="text-align:center;">${G.pars[hi]}</td>
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:${cols[sClass(s,G.pars[hi])]||'#fff'}">${s}</td>
      <td style="text-align:center;font-weight:700;color:${d<0?'#e74c3c':d>0?'#3498db':'#2ecc71'}">${ds}</td>
    </tr>`;
  });
  document.getElementById('stat-detail').innerHTML=det+'</table></div>';
}

// ===== ゴルフ場登録 =====
function getCourses(){try{return JSON.parse(localStorage.getItem(CKEY)||'{}');}catch(e){return {};}}
function setCourses(obj){localStorage.setItem(CKEY,JSON.stringify(obj));}

function buildVtbl(){
  const ob=document.getElementById('vtbl-out');
  const ib=document.getElementById('vtbl-in');
  if(!ob||!ib) return;
  ob.innerHTML='';
  for(let i=0;i<9;i++){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="color:var(--green);font-weight:700;text-align:left;padding-left:10px;">H${i+1}</td><td><input class="cpi" type="number" id="cfp${i}" min="3" max="6" value="4" oninput="calcCfSum()"></td>`;
    ob.appendChild(tr);
  }
  ib.innerHTML='';
  for(let i=9;i<18;i++){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="color:var(--green);font-weight:700;text-align:left;padding-left:10px;">H${i+1}</td><td><input class="cpi" type="number" id="cfp${i}" min="3" max="6" value="4" oninput="calcCfSum()"></td>`;
    ib.appendChild(tr);
  }
  calcCfSum();
}

function calcCfSum(){
  let out=0,inn=0;
  for(let i=0;i<9;i++)  out+=parseInt(document.getElementById('cfp'+i)?.value)||0;
  for(let i=9;i<18;i++) inn+=parseInt(document.getElementById('cfp'+i)?.value)||0;
  const o=document.getElementById('cf-out-sum');if(o)o.textContent=out;
  const i=document.getElementById('cf-in-sum'); if(i)i.textContent=inn;
}

function saveCourse(){
  const club=document.getElementById('cf-name').value.trim();
  if(!club){toast('ゴルフ場名を入力してください');return;}
  const outName=document.getElementById('cf-out-name').value.trim()||'OUT';
  const inName =document.getElementById('cf-in-name').value.trim() ||'IN';
  const pars=[];
  for(let i=0;i<18;i++){const v=parseInt(document.getElementById('cfp'+i)?.value);pars.push(isNaN(v)?4:v);}
  const cs=getCourses();
  if(!cs[club]) cs[club]={};
  cs[club][outName]=pars.slice(0,9);
  cs[club][inName] =pars.slice(9,18);
  setCourses(cs);
  renderGcList();
  toast('💾「'+club+'」を保存しました');
}

function resetCf(){
  document.getElementById('cf-name').value='';
  document.getElementById('cf-out-name').value='';
  document.getElementById('cf-in-name').value='';
  document.getElementById('cf-ttl').textContent='新規登録';
  buildVtbl();
}

function editGc(club){
  const cs=getCourses();
  const c=cs[club];if(!c)return;
  document.getElementById('cf-name').value=club;
  document.getElementById('cf-ttl').textContent='編集：'+club;
  const names=Object.keys(c);
  const outKey=names[0]||'OUT', inKey=names[1]||'IN';
  document.getElementById('cf-out-name').value=outKey;
  document.getElementById('cf-in-name').value=inKey;
  showPage('course');
  setTimeout(()=>{
    const op=c[outKey]||Array(9).fill(4);
    const ip=c[inKey] ||Array(9).fill(4);
    for(let i=0;i<9;i++){const el=document.getElementById('cfp'+i);if(el)el.value=op[i]||4;}
    for(let i=0;i<9;i++){const el=document.getElementById('cfp'+(i+9));if(el)el.value=ip[i]||4;}
    calcCfSum();
  },100);
}

function delGc(club){
  if(!confirm('「'+club+'」を削除しますか？'))return;
  const cs=getCourses();delete cs[club];setCourses(cs);renderGcList();toast('🗑️ 削除しました');
}

function renderGcList(){
  const el=document.getElementById('gc-list');
  const cs=getCourses(),clubs=Object.keys(cs);
  if(!clubs.length){el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:8px;">⛳</div><div>登録済みゴルフ場がありません</div></div>';return;}
  el.innerHTML=clubs.map(club=>{
    const c=cs[club];
    const cards=Object.keys(c).map(cn=>{
      const pars=c[cn],sum=pars.reduce((a,b)=>a+b,0);
      const cells=pars.map((p,i)=>`<div class="gpc"><div class="gpnl">${i+1}</div><div class="gpv">${p}</div></div>`).join('');
      return `<div class="gccr"><div style="font-weight:600;font-size:13px;color:var(--gold);margin-bottom:4px;">🏌️ ${cn}</div><div class="gpr">${cells}</div><div class="gsub">計：${sum}</div></div>`;
    }).join('');
    const sc=club.replace(/'/g,"\\'");
    return `<div class="gcc"><div class="gcch"><div class="gccn">⛳ ${club}</div><div style="display:flex;gap:5px;"><button class="bsm bsm-g" onclick="editGc('${sc}')">✏️</button><button class="bsm bsm-r" onclick="delGc('${sc}')">🗑️</button></div></div>${cards}</div>`;
  }).join('');
}

// ===== 新規ラウンド =====
function populateClubSel(){
  const sel=document.getElementById('sel-club');
  const cs=getCourses();
  sel.innerHTML='<option value="">-- ゴルフ場を選択 --</option>'
    +Object.keys(cs).map(n=>`<option value="${n}">${n}</option>`).join('');
}

function onCourseManualInput(){
  // 手入力時はコース選択をリセット
  document.getElementById('sel-club').value='';
  document.getElementById('sel-out').innerHTML='<option value="">-- 前半コース --</option>';
  document.getElementById('sel-in').innerHTML='<option value="">-- 後半コース --</option>';
  G.pars=[...DPARS];
}

function onClubChange(){
  const club=document.getElementById('sel-club').value;
  const sOut=document.getElementById('sel-out');
  const sIn =document.getElementById('sel-in');
  document.getElementById('new-course').value=club;
  G.pars=[...DPARS];
  if(!club){
    sOut.innerHTML='<option value="">-- 前半コース --</option>';
    sIn.innerHTML ='<option value="">-- 後半コース --</option>';
    return;
  }
  const cs=getCourses(),c=cs[club];
  if(!c)return;
  const names=Object.keys(c);
  const opts='<option value="">-- 選択 --</option>'+names.map(n=>`<option value="${n}">${n}</option>`).join('');
  sOut.innerHTML=opts; sIn.innerHTML=opts;
  if(names.length>=1){sOut.value=names[0];}
  if(names.length>=2){sIn.value=names[1];}
  onCourseChange();
}

function onCourseChange(){
  const club=document.getElementById('sel-club').value;
  const outN=document.getElementById('sel-out').value;
  const inN =document.getElementById('sel-in').value;
  if(!club)return;
  const cs=getCourses(),c=cs[club];if(!c)return;
  const outP=(outN&&c[outN])?c[outN]:Array(9).fill(4);
  const inP =(inN &&c[inN]) ?c[inN] :Array(9).fill(4);
  G.pars=[...outP.slice(0,9),...inP.slice(0,9)];
  const txt=[outN,inN].filter(Boolean).join('/');
  if(club) document.getElementById('new-course').value=club+(txt?' '+txt:'');
}

function openNewRound(){
  populateClubSel();
  document.getElementById('new-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('sel-club').value='';
  document.getElementById('new-course').value='';
  document.getElementById('sel-out').innerHTML='<option value="">-- 前半コース --</option>';
  document.getElementById('sel-in').innerHTML ='<option value="">-- 後半コース --</option>';
  for(let i=0;i<4;i++){const el=document.getElementById('p'+i);if(el)el.value='';}
  G.pars=[...DPARS];
  document.getElementById('modal-new').classList.add('open');
}

function createRound(){
  const course=document.getElementById('new-course').value.trim()||'（未設定）';
  const dateRaw=document.getElementById('new-date').value;
  const holes=parseInt(document.getElementById('new-holes').value);
  const players=[];
  for(let i=0;i<4;i++){const v=(document.getElementById('p'+i)?.value||'').trim();if(v)players.push(v);}
  if(!players.length){toast('プレイヤーを入力してください');return;}
  // PARを確定
  onCourseChange();
  const pars=G.pars&&G.pars.length>=holes?G.pars.slice(0,holes):[...DPARS].slice(0,holes);
  G.id=null; G.course=course; G.date=dateRaw?fmtDate(dateRaw):'-';
  G.holes=holes; G.players=players; G.pars=pars; G.statsP=0;
  initData();
  document.getElementById('hdr-course').textContent=G.course;
  document.getElementById('modal-new').classList.remove('open');
  renderScore(); showPage('score');
  toast('ラウンドを作成しました ⛳');
  persist();
}

// ===== UTILS =====
function fmtDate(s){
  const d=new Date(s+'T00:00:00');
  const days=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== INIT =====
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
loadSaved();
// パットボタンの初期状態
updatePuttBtn();
document.getElementById('hdr-course').textContent=G.course||'-';
if(G.players.length) renderScore();
</script>
