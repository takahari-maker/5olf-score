<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ゴルフスコア管理</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GolfScore">
<meta name="theme-color" content="#1a1a1a">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@400;600;700&display=swap');

  :root {
    --bg: #1a1a1a;
    --bg2: #2a2a2a;
    --bg3: #333;
    --card: #222;
    --green: #2d7a4f;
    --green-l: #3da366;
    --gold: #c9a84c;
    --gold-l: #f0d98a;
    --red: #e74c3c;
    --blue: #3498db;
    --orange: #e67e22;
    --white: #fff;
    --gray1: #aaa;
    --gray2: #666;
    --gray3: #444;
    --active: #e67e22;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--white); display:flex; flex-direction:column; }

  /* ── Header ── */
  .hdr {
    background: var(--bg2);
    border-bottom: 1px solid var(--bg3);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    flex-shrink: 0;
  }
  .hdr-left { display:flex; align-items:center; gap:10px; }
  .hdr-logo { font-family:'Oswald',sans-serif; font-size:18px; font-weight:700; color:var(--gold); letter-spacing:2px; }
  .hdr-course { font-size:13px; color:var(--gray1); }
  .hdr-btns { display:flex; gap:6px; }
  .hdr-btn { background:transparent; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
  .hdr-btn.solid { background:var(--gold); color:#1a1a1a; }

  /* ── Nav ── */
  .nav { display:flex; background:var(--bg2); border-bottom:1px solid var(--bg3); flex-shrink:0; }
  .nav-tab { flex:1; padding:10px 4px; text-align:center; font-size:11px; color:var(--gray2); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
  .nav-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

  /* ── Pages ── */
  .pages { flex:1; overflow:hidden; position:relative; }
  .page { display:none; position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .page.active { display:block; }

  /* ════════════════════════════
     SCORE PAGE
  ════════════════════════════ */
  .score-page-inner { display:flex; flex-direction:column; height:100%; }

  /* スコアテーブル */
  .score-tbl-wrap { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; }
  .score-tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .score-tbl thead tr { position:sticky; top:0; z-index:10; }
  .score-tbl thead tr:first-child th { background:var(--green); }
  .score-tbl th { padding:7px 4px; text-align:center; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,0.15); white-space:nowrap; }
  .score-tbl th.h-col { background:var(--gold); color:#1a1a1a; min-width:36px; position:sticky; left:0; z-index:11; }
  .score-tbl td { padding:3px 3px; text-align:center; border:1px solid var(--bg3); vertical-align:middle; }
  .score-tbl tbody tr:nth-child(even) td { background:#1e1e1e; }
  .score-tbl tbody tr:hover td { background:#252525; }
  .score-tbl td.hole-cell { background:var(--bg2); font-family:'Oswald',sans-serif; font-size:14px; font-weight:600; color:var(--gold); position:sticky; left:0; z-index:5; }
  .score-tbl td.par-cell { background:#1a3a2e; font-weight:700; color:#aaa; font-size:12px; }

  /* スコア入力 */
  .sc-input {
    width:46px; height:38px; background:var(--bg3); border:1.5px solid var(--gray3);
    border-radius:5px; text-align:center; font-size:17px; font-weight:700;
    color:white; font-family:'Oswald',sans-serif; -moz-appearance:textfield;
  }
  .sc-input::-webkit-inner-spin-button { display:none; }
  .sc-input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,168,76,0.25); }
  .sc-input.s-eagle  { background:#3a2800; border-color:#f39c12; color:#f39c12; }
  .sc-input.s-birdie { background:#3a1a1a; border-color:#e74c3c; color:#e74c3c; }
  .sc-input.s-par    { background:#1a3a22; border-color:#2ecc71; color:#2ecc71; }
  .sc-input.s-bogey  { background:#1a2a3a; border-color:#3498db; color:#3498db; }
  .sc-input.s-double { background:#2a1a3a; border-color:#9b59b6; color:#9b59b6; }
  .sc-input.s-triple { background:#3a1a1a; border-color:#c0392b; color:#c0392b; }

  /* パット入力 */
  .pt-input {
    width:36px; height:28px; background:var(--bg3); border:1px solid var(--gray3);
    border-radius:4px; text-align:center; font-size:13px; font-weight:600;
    color:var(--gray1); font-family:'Oswald',sans-serif; -moz-appearance:textfield;
  }
  .pt-input::-webkit-inner-spin-button { display:none; }
  .pt-input:focus { outline:none; border-color:var(--blue); }

  /* 小計・合計行 */
  .score-tbl tr.sub-row td { background:var(--green); color:white; font-weight:700; font-size:13px; border:1px solid rgba(255,255,255,0.2); }
  .score-tbl tr.sub-row td.hole-cell { background:var(--green); }
  .score-tbl tr.total-row td { background:#0d2b1a; color:white; font-weight:700; font-size:14px; border:1px solid rgba(255,255,255,0.2); }
  .score-tbl tr.total-row td.hole-cell { background:#0d2b1a; }

  /* サマリーバー */
  .score-summary {
    background:var(--bg2); border-top:1px solid var(--bg3);
    display:flex; flex-shrink:0;
    padding:6px 10px; gap:0;
  }
  .ss-item { text-align:center; flex:1; border-right:1px solid var(--bg3); padding:0 6px; }
  .ss-item:last-child { border-right:none; }
  .ss-name { font-size:10px; color:var(--gray1); margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ss-gross { font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; color:var(--white); line-height:1.1; }
  .ss-diff { font-size:11px; font-weight:700; color:var(--gray1); }

  /* ════════════════════════════
     OLYMPIC PAGE
  ════════════════════════════ */
  .oly-page-inner { padding:10px; }
  .oly-setup { background:var(--card); border-radius:10px; padding:12px 14px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .oly-setup label { font-size:12px; color:var(--gray1); }
  .oly-setup input { background:var(--bg3); border:1px solid var(--gray3); border-radius:6px; color:white; font-size:14px; padding:6px 10px; width:90px; font-family:'Noto Sans JP',sans-serif; -moz-appearance:textfield; }
  .oly-setup input::-webkit-inner-spin-button { display:none; }
  .oly-setup input:focus { outline:none; border-color:var(--gold); }

  .section-ttl { font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; color:var(--gold); padding:8px 0 6px; border-bottom:1px solid var(--bg3); margin-bottom:8px; }

  /* オリンピック入力テーブル */
  .oly-tbl-wrap { overflow-x:auto; margin-bottom:12px; }
  .oly-tbl { width:100%; border-collapse:collapse; font-size:13px; min-width:360px; }
  .oly-tbl thead tr { background:var(--green); }
  .oly-tbl th { padding:7px 4px; text-align:center; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,0.15); }
  .oly-tbl th.h-col { background:var(--gold); color:#1a1a1a; min-width:40px; }
  .oly-tbl td { padding:3px 3px; text-align:center; border:1px solid var(--bg3); vertical-align:middle; }
  .oly-tbl tr:nth-child(even) td { background:#1e1e1e; }
  .oly-tbl tr:hover td { background:#252525; }
  .oly-input {
    width:48px; height:38px; background:var(--bg3); border:1.5px solid var(--gray3);
    border-radius:5px; text-align:center; font-size:16px; font-weight:700;
    color:white; font-family:'Oswald',sans-serif; -moz-appearance:textfield;
  }
  .oly-input::-webkit-inner-spin-button { display:none; }
  .oly-input:focus { outline:none; border-color:var(--gold); }
  .oly-input.has-val { border-color:var(--green-l); background:#1a2f22; }
  .oly-input.is-neg  { border-color:var(--red); background:#2f1a1a; }
  .oly-sub td { background:#1a3a2e; color:white; font-weight:700; padding:5px 4px; border:1px solid rgba(255,255,255,0.1); }
  .oly-total-row td { background:#0d2b1a; color:white; font-weight:700; padding:7px 4px; border:1px solid rgba(255,255,255,0.1); font-size:14px; }

  /* pt表示 */
  .pt-cell { font-family:'Oswald',sans-serif; font-size:14px; font-weight:700; }
  .pt-plus  { color:#2ecc71; }
  .pt-minus { color:var(--red); }
  .pt-zero  { color:var(--gray2); }
  .pt-none  { color:var(--bg3); }

  /* 集計テーブル */
  .rank-tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .rank-tbl thead tr { background:var(--green); }
  .rank-tbl th { padding:8px 6px; text-align:center; font-size:11px; font-weight:600; }
  .rank-tbl td { padding:9px 6px; text-align:center; border-bottom:1px solid var(--bg3); }
  .rank-tbl tbody tr:last-child td { border-bottom:none; }
  .rank-tbl tbody tr:hover td { background:#1e1e1e; }
  .p-name { text-align:left !important; padding-left:12px !important; font-weight:600; }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; font-weight:700; font-size:11px; }
  .rank-1 { background:var(--gold); color:#1a1a1a; }
  .rank-2 { background:#888; color:white; }
  .rank-3 { background:#cd7f32; color:white; }

  /* ════════════════════════════
     HISTORY PAGE
  ════════════════════════════ */
  .hist-inner { padding:10px; }
  .round-card { background:var(--card); border-radius:10px; margin-bottom:8px; overflow:hidden; }
  .rc-hdr { background:linear-gradient(90deg,var(--green),#1a4a2e); padding:8px 12px; display:flex; justify-content:space-between; align-items:center; }
  .rc-title { font-weight:700; font-size:14px; }
  .rc-date { font-size:11px; opacity:0.8; }
  .rc-body { padding:10px 12px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .rc-stat { text-align:center; }
  .rc-val { font-family:'Oswald',sans-serif; font-size:22px; font-weight:700; color:var(--gold); }
  .rc-lbl { font-size:10px; color:var(--gray1); }
  .rc-actions { margin-left:auto; display:flex; gap:6px; }
  .btn-sm { padding:5px 10px; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer; border:none; font-family:'Noto Sans JP',sans-serif; }
  .btn-load { background:var(--green); color:white; }
  .btn-del  { background:#3a1a1a; color:var(--red); border:1px solid #5a2a2a; }
  .rc-saved { font-size:10px; color:var(--gray2); padding:2px 12px 8px; }

  /* ════════════════════════════
     STATS PAGE
  ════════════════════════════ */
  .stats-inner { padding:10px; }
  .p-chips { display:flex; gap:6px; flex-wrap:wrap; padding:8px 0 10px; }
  .p-chip { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid var(--bg3); background:var(--bg2); cursor:pointer; color:var(--gray1); }
  .p-chip.active { background:var(--green); border-color:var(--green); color:white; }
  .stat-card { background:var(--card); border-radius:10px; padding:14px; margin-bottom:10px; }
  .stat-card-ttl { font-weight:700; font-size:13px; color:var(--gold); margin-bottom:8px; }
  .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat-box { text-align:center; padding:9px; background:var(--bg2); border-radius:8px; }
  .stat-box-val { font-family:'Oswald',sans-serif; font-size:20px; font-weight:700; color:var(--gold); }
  .stat-box-lbl { font-size:10px; color:var(--gray1); margin-top:2px; }
  .bar-chart { display:flex; align-items:flex-end; gap:4px; height:60px; margin:8px 0; }
  .bar-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .bar-fill { width:100%; border-radius:3px 3px 0 0; }
  .bar-lbl { font-size:9px; color:var(--gray1); text-align:center; line-height:1.2; }
  .bar-val { font-size:9px; font-weight:700; }

  /* ── Modal ── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg2); border-radius:14px; width:100%; max-width:400px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5); border:1px solid var(--bg3); }
  .modal-hdr { background:var(--green); color:white; padding:14px 18px; border-radius:14px 14px 0 0; display:flex; justify-content:space-between; align-items:center; }
  .modal-ttl { font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; }
  .modal-close { background:none; border:none; color:white; font-size:22px; cursor:pointer; }
  .modal-body { padding:16px; }
  .modal-ftr { padding:12px 16px; border-top:1px solid var(--bg3); display:flex; gap:8px; justify-content:flex-end; }
  .m-label { font-size:12px; color:var(--gray1); margin-bottom:4px; display:block; }
  .m-input { width:100%; padding:8px 10px; border:1.5px solid var(--bg3); border-radius:6px; font-size:14px; color:white; font-family:'Noto Sans JP',sans-serif; background:var(--bg3); margin-bottom:10px; }
  .m-input:focus { outline:none; border-color:var(--green); }
  .m-row { display:flex; gap:8px; }
  .m-row .m-group { flex:1; }
  .m-select { width:100%; padding:8px 10px; border:1.5px solid var(--bg3); border-radius:6px; font-size:14px; color:white; font-family:'Noto Sans JP',sans-serif; background:var(--bg3); margin-bottom:10px; }
  .m-select:focus { outline:none; border-color:var(--green); }
  .btn { padding:9px 18px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'Noto Sans JP',sans-serif; }
  .btn-primary { background:var(--green); color:white; }
  .btn-gold { background:var(--gold); color:#1a1a1a; }
  .btn-outline { background:transparent; border:1.5px solid var(--bg3); color:var(--gray1); }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(100px); background:#333; color:white; padding:10px 20px; border-radius:8px; font-size:13px; box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:300; transition:transform 0.3s; pointer-events:none; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .empty-state { text-align:center; padding:40px 20px; color:var(--gray2); }
  .empty-icon { font-size:40px; margin-bottom:10px; }

  /* par edit modal */
  .par-modal { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); border-radius:14px 14px 0 0; padding:16px; z-index:150; transform:translateY(100%); transition:transform 0.3s; border-top:1px solid var(--bg3); }
  .par-modal.open { transform:translateY(0); }
  .par-modal-title { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--gold); }
  .par-numpad { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .par-np-btn { background:var(--bg3); border:none; border-radius:8px; color:white; font-family:'Oswald',sans-serif; font-size:20px; font-weight:600; padding:14px; cursor:pointer; }
  .par-np-btn.active { background:var(--green); }
  .par-np-btn.cancel { background:#3a1a1a; color:var(--red); font-family:'Noto Sans JP',sans-serif; font-size:14px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">⛳ GOLF</div>
    <div class="hdr-course" id="hdr-course">大阪ゴルフクラブ</div>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" onclick="saveRound()">💾 保存</button>
    <button class="hdr-btn solid" onclick="openModal()">＋ 新規</button>
  </div>
</div>
<div class="nav">
  <div class="nav-tab active" onclick="showPage('score')">🏌️ スコア</div>
  <div class="nav-tab" onclick="showPage('olympic')">🏅 オリンピック</div>
  <div class="nav-tab" onclick="showPage('history')">📋 履歴</div>
  <div class="nav-tab" onclick="showPage('stats')">📊 統計</div>
</div>

<div class="pages">

  <!-- ===== SCORE ===== -->
  <div id="page-score" class="page active">
    <div class="score-page-inner">
      <div class="score-tbl-wrap">
        <table class="score-tbl" id="score-tbl"></table>
      </div>
      <div class="score-summary" id="score-summary"></div>
    </div>
  </div>

  <!-- ===== OLYMPIC ===== -->
  <div id="page-olympic" class="page">
    <div class="oly-page-inner">
      <div class="oly-setup">
        <div>
          <label>単価（円/pt）</label>
          <input type="number" id="unit-price" value="100" min="1" onchange="renderOlySummary()">
        </div>
        <div style="font-size:11px;color:var(--gray1);">スコアタブとは独立して入力できます。マイナス可。</div>
      </div>

      <div class="section-ttl">✏️ スコア入力 &amp; ポイント</div>
      <div class="oly-tbl-wrap">
        <table class="oly-tbl" id="oly-score-table"></table>
      </div>

      <div class="section-ttl">🏆 順位・収支</div>
      <div style="overflow-x:auto;">
        <table class="rank-tbl" id="oly-rank-table"></table>
      </div>
    </div>
  </div>

  <!-- ===== HISTORY ===== -->
  <div id="page-history" class="page">
    <div class="hist-inner">
      <div style="font-family:'Oswald',sans-serif;font-size:15px;color:var(--gold);padding:8px 0 10px;">📋 ラウンド履歴</div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- ===== STATS ===== -->
  <div id="page-stats" class="page">
    <div class="stats-inner">
      <div class="p-chips" id="stats-chips"></div>
      <div class="stat-card">
        <div class="stat-card-ttl">スコア分布</div>
        <div class="bar-chart" id="stats-bar"></div>
        <div class="stat-grid" id="stats-grid"></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-ttl">ホール別スコア</div>
        <div id="stats-detail"></div>
      </div>
    </div>
  </div>
</div>

<!-- New Round Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-ttl">⛳ 新規ラウンド</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <label class="m-label">コースを選択（PARが自動入力されます）</label>
      <select class="m-select" id="course-select" onchange="onCourseSelect()">
        <option value="">-- コースを選択 --</option>
        <optgroup label="── 登録済みコース ──" id="saved-courses-group"></optgroup>
        <optgroup label="── プリセット ──">
          <option value="preset:高遊原カントリークラブ:4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4">高遊原カントリークラブ</option>
          <option value="preset:大阪ゴルフクラブ:4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4">大阪ゴルフクラブ</option>
          <option value="preset:カスタム:4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4">カスタム（手動でPAR設定）</option>
        </optgroup>
      </select>
      <label class="m-label">コース名</label>
      <input class="m-input" type="text" id="new-course" placeholder="例：〇〇ゴルフクラブ">
      <div class="m-row">
        <div class="m-group">
          <label class="m-label">日付</label>
          <input class="m-input" type="date" id="new-date">
        </div>
        <div class="m-group">
          <label class="m-label">ホール数</label>
          <select class="m-select" id="new-holes">
            <option value="18">18ホール</option>
            <option value="9">9ホール</option>
          </select>
        </div>
      </div>
      <div style="font-weight:700;color:var(--gold);margin:4px 0 8px;font-size:13px;">プレイヤー（最大4名）</div>
      <div id="player-setup">
        <input class="m-input" type="text" id="pname-0" placeholder="プレイヤー1">
        <input class="m-input" type="text" id="pname-1" placeholder="プレイヤー2">
        <input class="m-input" type="text" id="pname-2" placeholder="プレイヤー3">
        <input class="m-input" type="text" id="pname-3" placeholder="プレイヤー4">
      </div>
      <label class="m-label" style="margin-top:6px;">このコースを登録する</label>
      <button class="btn btn-outline" onclick="saveCurrentCourse()" style="width:100%;font-size:13px;">💾 コースを登録</button>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-gold" onclick="createRound()">開始 ▶</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== STATE ==========
const DEFAULT_PARS = [4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4];
const STORAGE_KEY  = 'golfScoreApp_v3';

let state = {
  currentId: null,
  course: '大阪ゴルフクラブ',
  date: '2026年3月24日（火）',
  holes: 18,
  players: ['田中 健太','山田 一朗','佐藤 誠','鈴木 浩二'],
  pars: [...DEFAULT_PARS],
  scores:    null, // [hole][player]  null=未入力
  putts:     null,
  olyScores: null,
  currentHole: 0,     // 0-indexed
  selectedPlayer: 0,  // 数字パッドの対象プレイヤー
  inputMode: 'score', // 'score' or 'putt'
  history: [],
  statsPlayer: 0
};

function initData() {
  const h=state.holes, n=state.players.length;
  state.scores    = Array.from({length:h},()=>Array(n).fill(null));
  state.putts     = Array.from({length:h},()=>Array(n).fill(null));
  state.olyScores = Array.from({length:h},()=>Array(n).fill(null));
  state.currentHole   = 0;
  state.selectedPlayer= 0;
  state.inputMode     = 'score';
}

// ========== STORAGE ==========
function saveRound() {
  const entry = {
    id: state.currentId||Date.now(),
    course:state.course, date:state.date,
    holes:state.holes, players:[...state.players], pars:[...state.pars],
    scores:    state.scores.map(r=>[...r]),
    putts:     state.putts.map(r=>[...r]),
    olyScores: state.olyScores.map(r=>[...r]),
    savedAt: new Date().toISOString()
  };
  state.currentId = entry.id;
  const idx=state.history.findIndex(h=>h.id===entry.id);
  if(idx>=0) state.history[idx]=entry; else state.history.unshift(entry);
  persist(); showToast('💾 保存しました');
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      history: state.history,
      current: {
        id:state.currentId, course:state.course, date:state.date,
        holes:state.holes, players:state.players, pars:state.pars,
        scores:state.scores, putts:state.putts, olyScores:state.olyScores,
        currentHole:state.currentHole, selectedPlayer:state.selectedPlayer
      }
    }));
  } catch(e){}
}

function loadFromStorage() {
  try {
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data=JSON.parse(raw);
    if(data.history) state.history=data.history;
    if(data.current){
      const c=data.current;
      Object.assign(state,{
        currentId:c.id||null, course:c.course||state.course,
        date:c.date||state.date, holes:c.holes||state.holes,
        players:c.players||state.players, pars:c.pars||DEFAULT_PARS.slice(0,state.holes),
        scores:    c.scores    ||Array.from({length:state.holes},()=>Array(state.players.length).fill(null)),
        putts:     c.putts     ||Array.from({length:state.holes},()=>Array(state.players.length).fill(null)),
        olyScores: c.olyScores ||Array.from({length:state.holes},()=>Array(state.players.length).fill(null)),
        currentHole:c.currentHole||0, selectedPlayer:c.selectedPlayer||0
      });
    }
    return true;
  } catch(e){ return false; }
}

function loadHistoryEntry(id) {
  const e=state.history.find(h=>h.id===id);
  if(!e) return;
  Object.assign(state,{
    currentId:e.id, course:e.course, date:e.date,
    holes:e.holes, players:[...e.players], pars:[...e.pars],
    scores:    e.scores.map(r=>[...r]),
    putts:     e.putts?e.putts.map(r=>[...r]):Array.from({length:e.holes},()=>Array(e.players.length).fill(null)),
    olyScores: e.olyScores?e.olyScores.map(r=>[...r]):Array.from({length:e.holes},()=>Array(e.players.length).fill(null)),
    currentHole:0, selectedPlayer:0, statsPlayer:0
  });
  document.getElementById('hdr-course').textContent=state.course;
  renderScorePage();
  showPage('score');
  showToast('📂 読み込みました');
}

function deleteHistoryEntry(id) {
  if(!confirm('このラウンドを削除しますか？')) return;
  state.history=state.history.filter(h=>h.id!==id);
  persist(); renderHistory(); showToast('🗑️ 削除しました');
}

// ========== NAV ==========
function showPage(p) {
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab')[{score:0,olympic:1,history:2,stats:3}[p]].classList.add('active');
  if(p==='score')   renderScorePage();
  if(p==='olympic') { renderOlyTable(); renderOlySummary(); }
  if(p==='stats')   { renderStatsChips(); renderStats(); }
  if(p==='history') renderHistory();
}

// ========== SCORE PAGE ==========
function renderScorePage() {
  // コース・日付はヘッダーに表示済みなので追加表示不要
  renderScoreTable();
  renderSummaryBar();
}

function getScoreClass(s, par) {
  if(s===null) return '';
  const d=s-par;
  if(d<=-2) return 's-eagle';
  if(d===-1) return 's-birdie';
  if(d===0)  return 's-par';
  if(d===1)  return 's-bogey';
  if(d===2)  return 's-double';
  return 's-triple';
}

function renderScoreTable() {
  const n=state.players.length, h=state.holes;

  let html = `<thead><tr>
    <th class="h-col">H</th>
    <th style="min-width:34px;background:#1a3a2e;color:#aaa;">PAR</th>
    ${state.players.map(p=>`<th style="min-width:52px;font-size:11px;">${p}</th>`).join('')}
  </tr></thead><tbody>`;

  function buildRows(start, end, label) {
    for(let hi=start; hi<end; hi++){
      const par=state.pars[hi];
      html += `<tr>
        <td class="hole-cell">${hi+1}</td>
        <td class="par-cell"><input class="sc-input" type="number" min="3" max="6"
          value="${par}" style="width:38px;height:30px;font-size:13px;background:transparent;border:none;color:#aaa;"
          oninput="scoreSetPar(this,${hi})" onfocus="this.select()"></td>
        ${state.players.map((_,pi)=>{
          const s=state.scores[hi][pi];
          const cls=getScoreClass(s,par);
          return `<td><input class="sc-input ${cls}" type="number" min="1" max="20"
            value="${s!==null?s:''}" placeholder="-"
            oninput="scoreInput(this,${hi},${pi})" onfocus="this.select()"></td>`;
        }).join('')}
      </tr>`;
    }
    // 小計行
    html += `<tr class="sub-row">
      <td class="hole-cell">${label}</td>
      <td>${state.pars.slice(start,end).reduce((a,b)=>a+b,0)}</td>
      ${state.players.map((_,pi)=>{
        const entered=state.scores.slice(start,end).filter(r=>r[pi]!==null);
        const sub=entered.reduce((a,r)=>a+(r[pi]||0),0);
        return `<td id="sub-${label}-${pi}" style="font-family:'Oswald',sans-serif;font-size:15px;">${entered.length?sub:'-'}</td>`;
      }).join('')}
    </tr>`;
  }

  buildRows(0, Math.min(9,h), 'OUT');
  if(h>9) buildRows(9, h, 'IN');

  // 合計行
  html += `<tr class="total-row">
    <td class="hole-cell">TOT</td>
    <td>${state.pars.slice(0,h).reduce((a,b)=>a+b,0)}</td>
    ${state.players.map((_,pi)=>{
      const any=state.scores.some(r=>r[pi]!==null);
      const tot=state.scores.reduce((a,r)=>a+(r[pi]!==null?r[pi]:0),0);
      return `<td id="tot-${pi}" style="font-family:'Oswald',sans-serif;font-size:16px;">${any?tot:'-'}</td>`;
    }).join('')}
  </tr></tbody>`;

  document.getElementById('score-tbl').innerHTML = html;
}

function scoreSetPar(input, hi) {
  const v=parseInt(input.value);
  if(!isNaN(v)&&v>=1){ state.pars[hi]=v; renderScoreTable(); renderSummaryBar(); }
}

// コース登録済みリストを初期ロード時にも反映
function initSavedCourses(){
  populateSavedCourses();
}

// スコア入力タイマー（2桁入力のため少し待つ）
const scoreTimers = {};

function scoreInput(input, hi, pi) {
  // タイマークリア
  const key = hi + '-' + pi;
  if(scoreTimers[key]) clearTimeout(scoreTimers[key]);

  const raw = input.value;
  const v = parseInt(raw);

  // 空欄→クリア即時
  if(raw === '' || raw === null) {
    state.scores[hi][pi] = null;
    input.className = 'sc-input';
    refreshScoreTotals(); renderSummaryBar();
    return;
  }
  // 2桁以上 or 明らかに完結（7以上は1桁でほぼ確定）→即時
  if(raw.length >= 2 || (v >= 7 && raw.length === 1)) {
    applyScore(input, hi, pi, v);
    return;
  }
  // 1桁（1〜6）は少し待って確定
  scoreTimers[key] = setTimeout(() => applyScore(input, hi, pi, parseInt(input.value)), 600);
}

function applyScore(input, hi, pi, v) {
  state.scores[hi][pi] = isNaN(v)||v<1 ? null : v;
  input.className = 'sc-input ' + getScoreClass(state.scores[hi][pi], state.pars[hi]);
  refreshScoreTotals();
  renderSummaryBar();
}

function refreshScoreTotals() {
  const n=state.players.length, h=state.holes, outEnd=Math.min(9,h);
  for(let pi=0;pi<n;pi++){
    const calc=(s,e)=>{
      const entered=state.scores.slice(s,e).filter(r=>r[pi]!==null);
      return entered.length?entered.reduce((a,r)=>a+(r[pi]||0),0):'-';
    };
    const o=document.getElementById(`sub-OUT-${pi}`); if(o) o.textContent=calc(0,outEnd);
    if(h>9){const i=document.getElementById(`sub-IN-${pi}`); if(i) i.textContent=calc(9,h);}
    const t=document.getElementById(`tot-${pi}`);
    if(t){const any=state.scores.some(r=>r[pi]!==null);t.textContent=any?state.scores.reduce((a,r)=>a+(r[pi]!==null?r[pi]:0),0):'-';}
  }
}

function renderSummaryBar() {
  let html='';
  state.players.forEach((name,pi)=>{
    const entered=state.scores.map((r,hi)=>({s:r[pi],par:state.pars[hi]})).filter(x=>x.s!==null);
    const gross=entered.reduce((a,x)=>a+x.s,0);
    const parE=entered.reduce((a,x)=>a+x.par,0);
    const diff=gross-parE;
    const any=entered.length>0;
    const ds=any?(diff===0?'E':diff>0?'+'+diff:''+diff):'-';
    html+=`<div class="ss-item">
      <div class="ss-name">${name}</div>
      <div class="ss-gross">${any?gross:'-'}</div>
      <div class="ss-diff">${ds}</div>
    </div>`;
  });
  document.getElementById('score-summary').innerHTML=html;
}

// ========== OLYMPIC ==========
function calcOlyPts(row) {
  const n=row.length;
  const valid=row.map((s,i)=>({s,i})).filter(x=>x.s!==null);
  const pts=Array(n).fill(null);
  if(valid.length<2) return pts;
  valid.forEach(({s:my,i:pi})=>{
    const others=valid.filter(x=>x.i!==pi);
    pts[pi]=my*others.length-others.reduce((a,x)=>a+x.s,0);
  });
  return pts;
}

function calcSubPts(start,end,pi) {
  let total=0, hasAny=false;
  for(let hi=start;hi<end;hi++){
    const pts=calcOlyPts(state.olyScores[hi]);
    if(pts[pi]!==null){total+=pts[pi];hasAny=true;}
  }
  return hasAny?total:null;
}

function fmtPt(v) {
  if(v===null) return '<span class="pt-none">-</span>';
  if(v===0)    return '<span class="pt-zero">0</span>';
  return v>0?`<span class="pt-plus">+${v}</span>`:`<span class="pt-minus">${v}</span>`;
}

function renderOlyTable() {
  const n=state.players.length, h=state.holes;
  let html=`<thead><tr>
    <th class="h-col">H</th>
    <th>PAR</th>
    ${state.players.map(p=>`<th style="font-size:10px;">${p}</th>`).join('')}
    ${state.players.map(p=>`<th style="font-size:10px;background:#0d2b1a;">${p}<br>pt</th>`).join('')}
  </tr></thead><tbody>`;

  function buildRows(start,end,label){
    for(let hi=start;hi<end;hi++){
      const row=state.olyScores[hi], pts=calcOlyPts(row), par=state.pars[hi];
      html+=`<tr><td><b>${hi+1}</b></td><td style="color:var(--gray1);">${par}</td>
        ${state.players.map((_,pi)=>{
          const s=row[pi];
          const cls=s!==null?(s<0?'is-neg':'has-val'):'';
          return `<td><input class="oly-input ${cls}" type="number"
            value="${s!==null?s:''}" placeholder="-"
            oninput="olyInput(this,${hi},${pi})" onfocus="this.select()"></td>`;
        }).join('')}
        ${pts.map((pt,pi)=>`<td class="pt-cell" id="olypt-${hi}-${pi}">${fmtPt(pt)}</td>`).join('')}
      </tr>`;
    }
    html+=`<tr class="oly-sub"><td colspan="2">${label}</td>
      ${state.players.map(()=>'<td>-</td>').join('')}
      ${state.players.map((_,pi)=>`<td id="olysub-${label}-${pi}">${fmtPt(calcSubPts(start,end,pi))}</td>`).join('')}
    </tr>`;
  }

  buildRows(0,Math.min(9,h),'OUT');
  if(h>9) buildRows(9,h,'IN');

  html+=`<tr class="oly-total-row"><td colspan="2">TOTAL</td>
    ${state.players.map(()=>'<td>-</td>').join('')}
    ${state.players.map((_,pi)=>`<td id="olytot-${pi}">${fmtPt(calcSubPts(0,h,pi))}</td>`).join('')}
  </tr></tbody>`;
  document.getElementById('oly-score-table').innerHTML=html;
}

function olyInput(input,hi,pi){
  const v=input.value.trim();
  state.olyScores[hi][pi]=(v===''||v==='-')?null:(isNaN(Number(v))?null:Number(v));
  const s=state.olyScores[hi][pi];
  input.className='oly-input '+(s===null?'':s<0?'is-neg':'has-val');
  const pts=calcOlyPts(state.olyScores[hi]);
  state.players.forEach((_,p)=>{
    const el=document.getElementById(`olypt-${hi}-${p}`);
    if(el) el.innerHTML=fmtPt(pts[p]);
  });
  refreshOlyTotals(); renderOlySummary();
}

function refreshOlyTotals(){
  const n=state.players.length, h=state.holes, outEnd=Math.min(9,h);
  for(let pi=0;pi<n;pi++){
    const o=document.getElementById(`olysub-OUT-${pi}`); if(o) o.innerHTML=fmtPt(calcSubPts(0,outEnd,pi));
    if(h>9){const i=document.getElementById(`olysub-IN-${pi}`);if(i)i.innerHTML=fmtPt(calcSubPts(9,h,pi));}
    const t=document.getElementById(`olytot-${pi}`); if(t) t.innerHTML=fmtPt(calcSubPts(0,h,pi));
  }
}

function renderOlySummary(){
  const unit=parseInt(document.getElementById('unit-price').value)||100;
  const n=state.players.length, h=state.holes, outEnd=Math.min(9,h);
  const totPts=state.players.map((_,pi)=>calcSubPts(0,h,pi));
  const ranked=totPts.map((p,i)=>({i,p})).sort((a,b)=>{
    if(a.p===null&&b.p===null) return 0;
    if(a.p===null) return 1; if(b.p===null) return -1;
    return a.p-b.p;
  });
  const fmtP=v=>{
    if(v===null) return '<span style="color:var(--gray2)">-</span>';
    if(v===0) return '<span style="color:var(--gray2);">0pt</span>';
    return v>0?`<span class="pt-plus">+${v}pt</span>`:`<span class="pt-minus">${v}pt</span>`;
  };
  let html=`<thead><tr>
    <th>順位</th><th class="p-name">プレイヤー</th>
    <th>OUTpt</th>${h>9?'<th>INpt</th>':''}
    <th>合計pt</th><th>収支</th>
  </tr></thead><tbody>`;
  ranked.forEach(({i:pi},rank)=>{
    const badge=rank<3?`<span class="rank-badge rank-${rank+1}">${rank+1}</span>`:rank+1;
    const tot=totPts[pi];
    const money=tot!==null?(-tot)*unit:null;
    const mStr=money===null?'-':
      money>=0?`<span class="pt-plus">+¥${money.toLocaleString()}</span>`
              :`<span class="pt-minus">¥${money.toLocaleString()}</span>`;
    html+=`<tr><td>${badge}</td><td class="p-name">${state.players[pi]}</td>
      <td>${fmtP(calcSubPts(0,outEnd,pi))}</td>
      ${h>9?`<td>${fmtP(calcSubPts(9,h,pi))}</td>`:''}
      <td style="font-weight:700;">${fmtP(tot)}</td>
      <td style="font-weight:700;">${mStr}</td>
    </tr>`;
  });
  document.getElementById('oly-rank-table').innerHTML=html+'</tbody>';
}

// ========== HISTORY ==========
function renderHistory(){
  const el=document.getElementById('history-list');
  if(!state.history.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div>保存されたラウンドがありません</div></div>';
    return;
  }
  el.innerHTML=state.history.map(r=>{
    // 自分（P1）のスコアのみ
    const p0scores = r.scores.map(row=>row[0]);
    const any = p0scores.some(s=>s!==null);
    const gross = p0scores.reduce((a,s)=>a+(s!==null?s:0),0);
    const parTot = r.pars.reduce((a,b)=>a+b,0);
    const diff = gross-parTot;
    const saved=r.savedAt?new Date(r.savedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="round-card">
      <div class="rc-hdr">
        <div class="rc-title">⛳ ${r.course}</div>
        <div class="rc-date">${r.date}</div>
      </div>
      <div class="rc-body">
        <div class="rc-stat">
          <div class="rc-val">${any?gross:'-'}</div>
          <div class="rc-lbl">${r.players[0]||'P1'} グロス</div>
        </div>
        <div class="rc-stat">
          <div class="rc-val">${any?(diff===0?'E':diff>0?'+'+diff:diff):'-'}</div>
          <div class="rc-lbl">±パー</div>
        </div>
        <div class="rc-stat">
          <div class="rc-val">${r.holes}H</div>
          <div class="rc-lbl">${r.players.length}名</div>
        </div>
        <div class="rc-actions">
          <button class="btn-sm btn-load" onclick="loadHistoryEntry(${r.id})">📂 読込</button>
          <button class="btn-sm btn-del" onclick="deleteHistoryEntry(${r.id})">🗑️</button>
        </div>
      </div>
      ${saved?`<div class="rc-saved">保存：${saved}</div>`:''}
    </div>`;
  }).join('');
}

// ========== STATS ==========
function renderStatsChips(){
  document.getElementById('stats-chips').innerHTML=
    state.players.map((p,i)=>
      `<div class="p-chip ${i===state.statsPlayer?'active':''}" onclick="selSP(${i})">${p}</div>`
    ).join('');
}
function selSP(i){state.statsPlayer=i;renderStatsChips();renderStats();}

function renderStats(){
  const pi=state.statsPlayer;
  let eagle=0,birdie=0,par=0,bogey=0,dbl=0,triple=0;
  state.scores.forEach((row,hi)=>{
    const s=row[pi]; if(s===null) return;
    const d=s-state.pars[hi];
    if(d<=-2)eagle++;else if(d===-1)birdie++;else if(d===0)par++;
    else if(d===1)bogey++;else if(d===2)dbl++;else triple++;
  });
  const max=Math.max(eagle,birdie,par,bogey,dbl,triple,1);
  document.getElementById('stats-bar').innerHTML=[
    {lbl:'Eagle\n以下',val:eagle,color:'#f39c12'},
    {lbl:'Birdie',val:birdie,color:'#e74c3c'},
    {lbl:'Par',val:par,color:'#2ecc71'},
    {lbl:'Bogey',val:bogey,color:'#3498db'},
    {lbl:'Dbl',val:dbl,color:'#9b59b6'},
    {lbl:'Triple+',val:triple,color:'#c0392b'},
  ].map(b=>`<div class="bar-item">
    <div class="bar-val" style="color:${b.color}">${b.val||''}</div>
    <div class="bar-fill" style="height:${b.val/max*50}px;background:${b.color}"></div>
    <div class="bar-lbl">${b.lbl}</div>
  </div>`).join('');

  const any=state.scores.some(r=>r[pi]!==null);
  const gross=state.scores.reduce((a,r)=>a+(r[pi]!==null?r[pi]:0),0);
  const pAny=state.putts.some(r=>r[pi]!==null);
  const putt=state.putts.reduce((a,r)=>a+(r[pi]!==null?r[pi]:0),0);
  const played=eagle+birdie+par+bogey+dbl+triple;
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-box"><div class="stat-box-val">${any?gross:'-'}</div><div class="stat-box-lbl">グロス</div></div>
    <div class="stat-box"><div class="stat-box-val">${played?Math.round(gross/played*10)/10:'-'}</div><div class="stat-box-lbl">平均スコア</div></div>
    <div class="stat-box"><div class="stat-box-val">${par+birdie+eagle}</div><div class="stat-box-lbl">パー以下</div></div>
    <div class="stat-box"><div class="stat-box-val">${bogey}</div><div class="stat-box-lbl">ボギー数</div></div>
    <div class="stat-box"><div class="stat-box-val">${dbl}</div><div class="stat-box-lbl">ダブルボギー</div></div>
    <div class="stat-box"><div class="stat-box-val">${pAny?putt:'-'}</div><div class="stat-box-lbl">総パット数</div></div>`;

  let det='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
  det+=`<tr style="background:var(--green);"><th style="padding:6px 8px;">H</th><th>Par</th><th>Score</th><th>±</th><th>Putt</th></tr>`;
  state.scores.forEach((row,hi)=>{
    const s=row[pi]; if(s===null) return;
    const d=s-state.pars[hi];
    const ds=d===0?'E':d>0?'+'+d:''+d;
    const sc=getScoreClass(s,state.pars[hi]);
    const colors={'s-eagle':'#f39c12','s-birdie':'#e74c3c','s-par':'#2ecc71','s-bogey':'#3498db','s-double':'#9b59b6','s-triple':'#c0392b','':'white'};
    det+=`<tr style="border-bottom:1px solid var(--bg3);">
      <td style="padding:5px 8px;text-align:center;">${hi+1}</td>
      <td style="text-align:center;">${state.pars[hi]}</td>
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:${colors[sc]||'white'}">${s}</td>
      <td style="text-align:center;font-weight:700;color:${d<0?'#e74c3c':d>0?'#3498db':'#2ecc71'}">${ds}</td>
      <td style="text-align:center;color:var(--gray1);">${state.putts[hi][pi]!==null?state.putts[hi][pi]:'-'}</td>
    </tr>`;
  });
  det+='</table></div>';
  document.getElementById('stats-detail').innerHTML=det;
}

// ========== MODAL ==========
// ========== コースデータ ==========
// PRESET_COURSES: name -> 18ホールのPAR配列
const PRESET_COURSES = {
  '高遊原カントリークラブ': [4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4],
  '大阪ゴルフクラブ':       [4,3,4,5,4,3,5,4,4,4,4,3,5,4,4,3,5,4],
};

function getSavedCourses() {
  try { return JSON.parse(localStorage.getItem('golfCourses_v1')||'{}'); } catch(e){return{};}
}
function saveCourses(obj) {
  localStorage.setItem('golfCourses_v1', JSON.stringify(obj));
}

function saveCurrentCourse() {
  const name = document.getElementById('new-course').value.trim();
  if(!name){ showToast('コース名を入力してください'); return; }
  const pars = state.pars || DEFAULT_PARS.slice(0,18);
  const courses = getSavedCourses();
  courses[name] = pars;
  saveCourses(courses);
  populateSavedCourses();
  showToast('💾 コースを登録しました');
}

function populateSavedCourses() {
  const group = document.getElementById('saved-courses-group');
  if(!group) return;
  const courses = getSavedCourses();
  group.innerHTML = Object.keys(courses).map(name =>
    `<option value="saved:${name}">${name}</option>`
  ).join('');
}

function onCourseSelect() {
  const val = document.getElementById('course-select').value;
  if(!val) return;
  if(val.startsWith('preset:')) {
    const parts = val.split(':');
    const name  = parts[1];
    const pars  = parts[2].split(',').map(Number);
    document.getElementById('new-course').value = name;
    state.pars = pars;
  } else if(val.startsWith('saved:')) {
    const name = val.slice(6);
    const courses = getSavedCourses();
    if(courses[name]) {
      document.getElementById('new-course').value = name;
      state.pars = courses[name];
    }
  }
}

// ========== MODAL ==========
function openModal(){
  document.getElementById('new-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('new-course').value='';
  document.getElementById('course-select').value='';
  for(let i=0;i<4;i++){
    const el=document.getElementById('pname-'+i);
    if(el) el.value='';
  }
  populateSavedCourses();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pname-0').focus(),300);
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

function createRound(){
  const course=document.getElementById('new-course').value.trim();
  const dateRaw=document.getElementById('new-date').value;
  const holes=parseInt(document.getElementById('new-holes').value);
  const players=[];
  for(let i=0;i<4;i++){
    const n=(document.getElementById('pname-'+i)?.value||'').trim();
    if(n) players.push(n);
  }
  if(!players.length){showToast('プレイヤーを入力してください');return;}
  // PARはonCourseSelectで設定済み or デフォルト
  const pars = state.pars && state.pars.length>=holes ? state.pars.slice(0,holes) : DEFAULT_PARS.slice(0,holes);
  state.currentId=null;
  state.course=course||'（コース未設定）';
  state.date=dateRaw?formatDate(dateRaw):state.date;
  state.holes=holes;
  state.players=players;
  state.pars=pars;
  initData();
  document.getElementById('hdr-course').textContent=state.course;
  closeModal();
  renderScorePage();
  showPage('score');
  showToast('ラウンドを作成しました ⛳');
}

function formatDate(s){
  const d=new Date(s+'T00:00:00');
  const days=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ========== INIT ==========
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
loadFromStorage();
initSavedCourses();
document.getElementById('hdr-course').textContent=state.course;
renderScorePage();
</script>
